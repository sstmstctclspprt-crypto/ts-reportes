name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: ouqwinavncjyyywvfyci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

  supabase:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        working-directory: backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Push database migrations
        working-directory: backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      - name: Deploy Edge Functions
        working-directory: backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy generate-ctpat-pdf --project-ref ${{ env.SUPABASE_PROJECT_REF }} --use-api --yes
          supabase functions deploy purge-expired-ctpat-data --project-ref ${{ env.SUPABASE_PROJECT_REF }} --use-api --yes

  # Vercel: conectar el repo en vercel.com para deploy automático del frontend.
  # Variables VITE_* en Vercel → Settings → Environment Variables (ver frontend/.env.example).
